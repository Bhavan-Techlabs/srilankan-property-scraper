# Output mode: "excel" saves a local .xlsx file (uploaded as GitHub Actions artifact)
#              "sheets" writes to Google Sheets
#              "both" does both
output_mode: "excel"

# Google Spreadsheet ID (only used when output_mode is "sheets" or "both")
spreadsheet_id: "1r-G0X1x3BwZfnFDG_R2KwOdnbNrs8nkL4FK-60_MYVQ"

# Path to Google service account credentials JSON (only used for Sheets output)
credentials_path: "credentials.json"

# Reference list of all areas we want covered across all scrapers.
# This is for tracking only — not read by the scraper code.
# When adding a new area, add URLs for it in each supported website below.
areas:
  - Piliyandala   # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Ja-Ela        # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Kandy         # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Wattala       # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Dehiwala      # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Colombo       # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓
  - Talawatugoda  # ikman ✓  lankapropertyweb ✗  ceylonproperty ✓
  - Kottawa       # ikman ✓  lankapropertyweb ✓  ceylonproperty ✓

# URLs to scrape — supports ikman.lk, lankapropertyweb.com, and ceylonproperty.lk
urls:
  # ikman.lk
  - "https://ikman.lk/en/ads/piliyandala/houses-for-sale"
  - "https://ikman.lk/en/ads/ja-ela/houses-for-sale"
  - "https://ikman.lk/en/ads/kandy/houses-for-sale"
  - "https://ikman.lk/en/ads/wattala/houses-for-sale"
  - "https://ikman.lk/en/ads/dehiwala/houses-for-sale"
  - "https://ikman.lk/en/ads/colombo/houses-for-sale"
  - "https://ikman.lk/en/ads/talawatugoda/houses-for-sale"
  - "https://ikman.lk/en/ads/kottawa/houses-for-sale"
  # lankapropertyweb.com/
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Central_Kandy_372e323930353732_38302e363333373238&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Kandy"
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Western_Piliyandala&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Piliyandala"
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Western_Dehiwala&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Dehiwala"
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Western_Kottawa&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Kottawa"
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Western_Ja+Ela&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Ja+Ela"
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Western_Wattala&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Wattala"
  - "https://www.lankapropertyweb.com/sale/index.php?search=1&location=Western_Colombo&property-type=House&from_index=1&min=Any&max=30000000&price-option=price_total&searchbox=Colombo"
  # ceylonproperty.lk
  - "https://ceylonproperty.lk/sale/property/in-piliyandala?toAmount=30000000"
  - "https://ceylonproperty.lk/sale/property/in-ja-ela?toAmount=30000000"
  - "https://ceylonproperty.lk/sale/property/in-kandy?toAmount=30000000"
  - "https://ceylonproperty.lk/sale/property/in-wattala?toAmount=30000000"
  - "https://ceylonproperty.lk/sale/property/in-dehiwala?toAmount=30000000"
  - "https://ceylonproperty.lk/sale/property/in-talawatugoda?toAmount=30000000"
  - "https://ceylonproperty.lk/sale/property/in-kottawa?toAmount=30000000"


# Global price filter (applied when the URL doesn't already have price params)
# Set to null to disable
price_filter:
  min: 5000000    # Rs 5 million
  max: 30000000   # Rs 30 million

# Duplicate detection: minimum description similarity ratio (0.0 - 1.0)
similarity_threshold: 0.9

# Delay between HTTP requests in seconds
request_delay: 1.5

# Only scrape ads posted within the last N days
max_age_days: 15

# Maximum pages to scrape per location (safety limit)
max_pages: 20
